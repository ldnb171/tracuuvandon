<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiểm tra vận đơn</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 16px;
        background: #f2f4f7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .container {
        max-width: 500px;
        margin: auto;
        background: #fff;
        padding: 18px;
        border-radius: 14px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h2 {
        text-align: center;
        margin-top: 0;
        margin-bottom: 18px;
    }

    input,
    textarea,
    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        font-size: 16px;
        border-radius: 10px;
        border: 1px solid #ccc;
    }

    textarea {
        min-height: 90px;
        resize: vertical;
    }

    button {
        border: none;
        cursor: pointer;
        font-weight: 600;
    }

    .btn-primary {
        background: #007bff;
        color: white;
    }

    .btn-success {
        background: #28a745;
        color: white;
    }

    .btn-copy {
        background: #6c757d;
        color: white;
        display: none;
    }

    .result {
        margin-top: 14px;
        background: #f8f9fa;
        padding: 12px;
        border-radius: 10px;
        white-space: pre-wrap;
        font-size: 15px;
        display: none;
    }
</style>
</head>

<body>

<div class="container">

    <h2>Kiểm tra vận đơn</h2>

    <input
        type="text"
        id="mvd"
        placeholder="Nhập mã vận đơn"
    >

    <button
        class="btn-primary"
        onclick="kiemTra()"
    >
        Kiểm tra hành trình
    </button>

    <textarea
        id="ghichu"
        placeholder="Nhập ghi chú..."
    ></textarea>

    <button
        class="btn-success"
        onclick="taoGhiChu()"
    >
        Tạo ghi chú
    </button>

    <div id="ketqua" class="result"></div>

    <button
        id="copyBtn"
        class="btn-copy"
        onclick="copyText()"
    >
        Copy
    </button>

</div>

<script>

function taoLink(mvd) {

    mvd = mvd.trim().toUpperCase();

    // Shopee Express
    if (mvd.startsWith("SPX")) {
        return "https://dichvudatdon.com/dashboard.php?page=tracking&mvd=" + mvd;
    }

    // GHN
    if (
        mvd.startsWith("G") ||
        mvd.startsWith("VNGH")
    ) {
        return "https://donhang.ghn.vn/?order_code=" + mvd;
    }

    // VN...K
    if (/^VN.*[A-Z]$/.test(mvd)) {
        return "https://dichvudatdon.com/dashboard.php?page=tracking&mvd=" + mvd;
    }

    // Best Express
    if (mvd.startsWith("TTVN")) {
        return "https://www.best-inc.vn/track?bills=" + mvd;
    }

    // J&T Express
    if (/^8\d+/.test(mvd)) {
        return "https://www.aftership.com/vi/track/jtexpress-vn/" + mvd;
    }

    // Viettel Post
    if (
        mvd.startsWith("VTPVN") ||
        mvd.startsWith("SHOPEEVTPVN")
    ) {
        return "https://vi.viettelpost.com.vn/tra-cuu-hanh-trinh-don";
    }

    // VNPost
    if (/^EO.*VN$/.test(mvd)) {
        return "https://www.aftership.com/vi/track/vnpost/" + mvd;
    }

    return "";
}

function kiemTra() {

    const mvd = document.getElementById("mvd").value.trim();

    if (!mvd) {
        alert("Vui lòng nhập mã vận đơn");
        return;
    }

    const link = taoLink(mvd);

    if (!link) {
        alert("Không nhận diện được đơn vị vận chuyển");
        return;
    }

    window.open(link, "_blank");
}

function taoGhiChu() {

    const mvd = document.getElementById("mvd").value.trim();

    const ghichu = document.getElementById("ghichu").value.trim();

    if (!mvd) {
        alert("Chưa nhập mã vận đơn");
        return;
    }

    const link = taoLink(mvd);

    if (!link) {
        alert("Không nhận diện được đơn vị vận chuyển");
        return;
    }

    const ketQuaText = ghichu + "\n\n" + link;

    const ketqua = document.getElementById("ketqua");

    ketqua.textContent = ketQuaText;

    ketqua.style.display = "block";

    document.getElementById("copyBtn").style.display = "block";
}

function copyText() {

    const text = document.getElementById("ketqua").textContent;

    navigator.clipboard.writeText(text)
    .then(() => {
        alert("Đã copy!");
    });
}

</script>

</body>
</html>
